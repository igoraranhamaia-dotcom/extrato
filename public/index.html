<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extrato</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      font-size: 14px;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }

    .saldo-header { text-align: right; }
    .saldo-header span {
      display: block;
      font-size: 11px;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .saldo-header strong { font-size: 24px; font-weight: 700; }
    .saldo-positivo { color: #4ade80; }
    .saldo-negativo { color: #f87171; }

    .form-card {
      background: white;
      margin: 24px 32px 0;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .campo { display: flex; flex-direction: column; gap: 4px; }

    .campo label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
    }

    .campo input, .campo select {
      height: 40px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
      background: #f9fafb;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }

    .campo input:focus, .campo select:focus {
      border-color: #1a1a2e;
      background: white;
    }

    .campo-descricao input { width: 260px; }
    .campo-valor input { width: 140px; }

    button.btn-lancar {
      height: 40px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    button.btn-lancar:hover { background: #2d2d4e; }

    .resumo {
      display: flex;
      gap: 12px;
      margin: 16px 32px 0;
    }

    .resumo-card {
      background: white;
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .resumo-card span {
      display: block;
      font-size: 11px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .resumo-card strong { font-size: 18px; font-weight: 700; }
    .valor-receita { color: #16a34a; }
    .valor-despesa { color: #dc2626; }
    .valor-saldo-pos { color: #16a34a; }
    .valor-saldo-neg { color: #dc2626; }

    .tabela-wrapper {
      margin: 16px 32px 32px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6b7280;
    }

    thead th.col-valor, thead th.col-saldo { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    td { padding: 12px 16px; vertical-align: middle; }

    .col-data { color: #6b7280; width: 160px; font-size: 13px; }
    .col-descricao { font-weight: 500; }
    .col-valor { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
    .col-saldo { text-align: right; font-size: 13px; color: #6b7280; font-variant-numeric: tabular-nums; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag-receita { background: #dcfce7; color: #16a34a; }
    .tag-despesa { background: #fee2e2; color: #dc2626; }

    .vazio {
      text-align: center;
      padding: 48px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <h1>EXTRATO</h1>
  <div class="saldo-header">
    <span>Saldo atual</span>
    <strong id="saldo-header">R$ 0,00</strong>
  </div>
</header>

<div class="form-card">
  <div class="campo campo-descricao">
    <label>Descrição</label>
    <input type="text" id="inp-descricao" placeholder="Ex: Salário, Aluguel, Mercado...">
  </div>
  <div class="campo campo-valor">
    <label>Valor (R$)</label>
    <input type="number" id="inp-valor" placeholder="0,00" min="0.01" step="0.01">
  </div>
  <div class="campo">
    <label>Tipo</label>
    <select id="inp-tipo">
      <option value="receita">+ Receita</option>
      <option value="despesa">− Despesa</option>
    </select>
  </div>
  <button class="btn-lancar" onclick="lancar()">Lançar</button>
</div>

<div class="resumo">
  <div class="resumo-card">
    <span>Total receitas</span>
    <strong class="valor-receita" id="total-receitas">R$ 0,00</strong>
  </div>
  <div class="resumo-card">
    <span>Total despesas</span>
    <strong class="valor-despesa" id="total-despesas">R$ 0,00</strong>
  </div>
  <div class="resumo-card">
    <span>Saldo</span>
    <strong id="total-saldo">R$ 0,00</strong>
  </div>
</div>

<div class="tabela-wrapper">
  <table>
    <thead>
      <tr>
        <th>Data / Hora</th>
        <th>Descrição</th>
        <th>Tipo</th>
        <th class="col-valor">Valor</th>
        <th class="col-saldo">Saldo acum.</th>
      </tr>
    </thead>
    <tbody id="corpo-tabela">
      <tr class="vazio">
        <td colspan="5">Nenhum lançamento ainda.</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  // Agora o HTML não sabe nada sobre localStorage
  // Ele conversa com o servidor via fetch

  function formatarMoeda(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatarData(isoString) {
    const d = new Date(isoString);
    return d.toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // Busca os lançamentos do servidor e renderiza
  async function carregarEAtualizar() {
    const resp = await fetch('/lancamentos');
    const lancamentos = await resp.json();
    renderizar(lancamentos);
  }

  async function lancar() {
    const descricao = document.getElementById('inp-descricao').value.trim();
    const valor     = parseFloat(document.getElementById('inp-valor').value);
    const tipo      = document.getElementById('inp-tipo').value;

    if (!descricao) {
      alert('Informe a descrição.');
      document.getElementById('inp-descricao').focus();
      return;
    }
    if (!valor || valor <= 0) {
      alert('Informe um valor válido.');
      document.getElementById('inp-valor').focus();
      return;
    }

    // Manda os dados pro servidor
    await fetch('/lancamentos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ descricao, valor, tipo })
    });

    document.getElementById('inp-descricao').value = '';
    document.getElementById('inp-valor').value = '';
    document.getElementById('inp-descricao').focus();

    carregarEAtualizar();
  }

  function renderizar(lancamentos) {
    const tbody = document.getElementById('corpo-tabela');

    if (lancamentos.length === 0) {
      tbody.innerHTML = `<tr class="vazio"><td colspan="5">Nenhum lançamento ainda.</td></tr>`;
      atualizarResumo(0, 0);
      return;
    }

    let saldoAcumulado = 0;
    let totalReceitas  = 0;
    let totalDespesas  = 0;

    const linhas = lancamentos.map(l => {
      if (l.tipo === 'receita') {
        saldoAcumulado += l.valor;
        totalReceitas  += l.valor;
      } else {
        saldoAcumulado -= l.valor;
        totalDespesas  += l.valor;
      }
      return { ...l, saldoNaMomento: saldoAcumulado };
    });

    linhas.reverse();

    tbody.innerHTML = linhas.map(l => {
      const ehReceita = l.tipo === 'receita';
      const corValor  = ehReceita ? '#16a34a' : '#dc2626';
      const sinal     = ehReceita ? '+' : '−';
      const corSaldo  = l.saldoNaMomento >= 0 ? '#6b7280' : '#dc2626';

      return `
        <tr>
          <td class="col-data">${formatarData(l.data)}</td>
          <td class="col-descricao">${l.descricao}</td>
          <td><span class="tag tag-${l.tipo}">${l.tipo}</span></td>
          <td class="col-valor" style="color:${corValor}">
            ${sinal} ${formatarMoeda(l.valor)}
          </td>
          <td class="col-saldo" style="color:${corSaldo}">
            ${formatarMoeda(l.saldoNaMomento)}
          </td>
        </tr>
      `;
    }).join('');

    atualizarResumo(totalReceitas, totalDespesas);
  }

  function atualizarResumo(receitas, despesas) {
    const saldo = receitas - despesas;

    document.getElementById('total-receitas').textContent = formatarMoeda(receitas);
    document.getElementById('total-despesas').textContent = formatarMoeda(despesas);

    const elSaldo = document.getElementById('total-saldo');
    elSaldo.textContent = formatarMoeda(saldo);
    elSaldo.className   = saldo >= 0 ? 'valor-saldo-pos' : 'valor-saldo-neg';

    const elHeader = document.getElementById('saldo-header');
    elHeader.textContent = formatarMoeda(saldo);
    elHeader.className   = saldo >= 0 ? 'saldo-positivo' : 'saldo-negativo';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement.closest('.form-card')) {
      lancar();
    }
  });

  // Carrega os dados ao abrir a página
  carregarEAtualizar();
</script>
</body>
</html>
